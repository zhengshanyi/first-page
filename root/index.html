<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>平行线的性质与判定 | 自由连线·最后计分</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #eef2fa 0%, #dce5f0 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(3px);
            padding: 20px 28px 30px;
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }

        h1 {
            text-align: center;
            font-size: 2.1rem;
            margin: 0 0 5px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            color: #1e4a76;
            font-weight: 600;
            border-bottom: 2px solid #b9d0eb;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px;
            padding-bottom: 5px;
            font-size: 1rem;
        }

        .desc {
            text-align: center;
            background: #e9f0fa;
            padding: 8px 18px;
            border-radius: 40px;
            margin-bottom: 28px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c5282;
        }

        .match-area {
            display: flex;
            flex-wrap: wrap;
            gap: 45px;
            justify-content: center;
            position: relative;
        }

        .column {
            flex: 1;
            min-width: 300px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            padding: 20px 20px;
            transition: all 0.2s;
        }

        .column h2 {
            text-align: center;
            font-size: 1.7rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 24px;
            color: #1e4a76;
            border-bottom: 3px dotted #8cb2d6;
            display: inline-block;
            width: 100%;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 18px 20px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            border: 2px solid #e2edf7;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
            font-size: 1.02rem;
            line-height: 1.4;
            position: relative;
            text-align: center;
        }

        .left-card {
            border-left: 12px solid #3b82f6;
            background: #ffffff;
        }

        .right-card {
            border-right: 12px solid #10b981;
            background: #ffffff;
        }

        .card.selected {
            background: #fff0cf;
            border-color: #f59e0b;
            transform: scale(1.01);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* 已正确配对的卡片变灰锁定 */
        .card.correct-matched {
            opacity: 0.7;
            background: #d9f0e6;
            border-color: #2c7a4d;
            text-decoration: line-through;
            cursor: default;
            pointer-events: none;
            filter: grayscale(0.05);
        }

        .card.correct-matched::after {
            content: "✓";
            font-size: 1.3rem;
            font-weight: bold;
            background: #2c7a4d;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            right: 16px;
            top: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* 连线基础样式 */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }

        .column {
            position: relative;
            z-index: 5;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        button {
            background: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: 0.15s;
            font-family: inherit;
        }

        .btn-reset {
            background: #ed8936;
            color: white;
        }

        .btn-reset:hover {
            background: #dd6b20;
            transform: translateY(-2px);
        }

        .btn-finish {
            background: #2b6cb0;
            color: white;
        }

        .btn-finish:hover {
            background: #2c5282;
            transform: translateY(-2px);
        }

        .feedback {
            text-align: center;
            margin-top: 22px;
            background: #eef2f9;
            padding: 12px;
            border-radius: 60px;
            color: #2c5282;
            font-weight: 500;
            font-size: 0.95rem;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* 结算弹窗 */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.4s ease;
        }

        .result-modal.show {
            visibility: visible;
            opacity: 1;
        }

        .result-content {
            text-align: center;
            background: linear-gradient(145deg, #fff7e0, #ffefb9);
            padding: 40px 60px;
            border-radius: 80px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            animation: popIn 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
            min-width: 320px;
        }

        @keyframes popIn {
            0% { transform: scale(0.2); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .score-number {
            font-size: 4rem;
            font-weight: 800;
            color: #b45309;
            margin: 20px 0;
        }

        .score-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c5282;
        }

        .trophy-icon {
            font-size: 4rem;
            filter: drop-shadow(0 4px 8px gold);
        }

        .encourage-icon {
            font-size: 3rem;
        }

        .result-btn {
            margin-top: 30px;
            background: #f59e0b;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .result-btn:hover {
            background: #d97706;
            transform: scale(1.02);
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #4b5563;
            margin-top: 18px;
        }

        canvas#fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @media (max-width: 780px) {
            .game-container {
                padding: 16px;
            }
            .card {
                padding: 14px 12px;
                font-size: 0.85rem;
            }
            .result-content {
                padding: 30px 35px;
            }
            .score-number {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>📐 平行线的性质 & 判定</h1>
    <div style="text-align: center;">
        <div class="sub">文字语言  ⇔  符号语言  |  自由连线 · 最后统计得分</div>
    </div>
    <div class="desc">
        ✨ 单击【文字描述】再单击【符号表达式】即可连线（反之亦可）。<br>
        🔗 无论对错，连线都会显示（正确为绿色实线，错误为橙色虚线）。<br>
        ✅ 完成所有连线后，点击【结束匹配 & 查看得分】统计答对数量。
    </div>

    <div class="match-area" id="matchArea">
        <div class="column" id="leftColumn">
            <h2>📖 文字语言</h2>
            <div class="card-list" id="leftList"></div>
        </div>
        <div class="column" id="rightColumn">
            <h2>🔣 符号语言</h2>
            <div class="card-list" id="rightList"></div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn-reset" id="resetBtn">🔄 重置 & 打乱顺序</button>
        <button class="btn-finish" id="finishBtn">🏁 结束匹配 & 查看得分</button>
    </div>
    <div id="feedbackMsg" class="feedback">
        💡 点击卡片连线，正确配对会锁定为绿色（卡片变灰+对勾）；错误连线会显示橙色虚线，可随时调整。
    </div>
    <footer>平行线定理：同位角/内错角/同旁内角 ⇔ 两直线平行 | 符号使用 ∵ ∴</footer>
</div>

<!-- 结算弹窗 -->
<div id="resultModal" class="result-modal">
    <div class="result-content" id="resultContent">
        <!-- 动态填充 -->
    </div>
</div>

<canvas id="fireworksCanvas"></canvas>

<script>
    // ======================= 配对数据 =======================
    const pairsLibrary = [
        { leftText: "两直线平行，同位角相等。", rightSymbol: "∵ a ∥ b  ∴ ∠1 = ∠4", pairId: 0 },
        { leftText: "两直线平行，内错角相等。", rightSymbol: "∵ a ∥ b  ∴ ∠2 = ∠4", pairId: 1 },
        { leftText: "两直线平行，同旁内角互补。", rightSymbol: "∵ a ∥ b  ∴ ∠3 + ∠4 = 180°", pairId: 2 },
        { leftText: "同位角相等，两直线平行。", rightSymbol: "∵ ∠1 = ∠4  ∴ a ∥ b", pairId: 3 },
        { leftText: "内错角相等，两直线平行。", rightSymbol: "∵ ∠2 = ∠4  ∴ a ∥ b", pairId: 4 },
        { leftText: "同旁内角互补，两直线平行。", rightSymbol: "∵ ∠3 + ∠4 = 180°  ∴ a ∥ b", pairId: 5 }
    ];

    // 全局状态
    let leftItems = [];      // { id, text, pairId, matched (正确配对锁定) }
    let rightItems = [];
    let connections = [];    // 存储所有的连线（无论对错）{ leftId, rightId, isCorrect }
    
    let selectedSide = null;
    let selectedId = null;
    
    // DOM 元素
    const leftContainer = document.getElementById('leftList');
    const rightContainer = document.getElementById('rightList');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const matchAreaDiv = document.getElementById('matchArea');
    let svgElement = null;
    let resizeObserver = null;
    
    // 烟花
    let fireworksCanvas = document.getElementById('fireworksCanvas');
    let ctx = null;
    let fireworksInterval = null;
    let isFireworksPlaying = false;
    
    // 结算弹窗
    const resultModal = document.getElementById('resultModal');
    const resultContent = document.getElementById('resultContent');
    
    // ---------- 辅助函数 ----------
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function initShuffledData() {
        const rawLeft = pairsLibrary.map((pair, idx) => ({
            id: idx,
            text: pair.leftText,
            pairId: pair.pairId,
            matched: false
        }));
        const rawRight = pairsLibrary.map((pair, idx) => ({
            id: idx,
            text: pair.rightSymbol,
            pairId: pair.pairId,
            matched: false
        }));
        leftItems = shuffleArray([...rawLeft]);
        rightItems = shuffleArray([...rawRight]);
        connections = [];
        selectedSide = null;
        selectedId = null;
    }
    
    function stopFireworks() {
        if (fireworksInterval) {
            clearInterval(fireworksInterval);
            fireworksInterval = null;
        }
        isFireworksPlaying = false;
        if (ctx) ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
    }
    
    function resetGame() {
        stopFireworks();
        resultModal.classList.remove('show');
        initShuffledData();
        renderAllCards();
        drawAllLines();
        feedbackDiv.innerHTML = "🔄 已重置并打乱顺序！任意连线，正确配对会锁定，错误连线仅显示虚线，最后点击「结束匹配」查看得分。";
        if (ctx) ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
    }
    
    // 绘制所有连线（根据 connections 数组）
    function drawAllLines() {
        if (!svgElement) return;
        while (svgElement.firstChild) svgElement.removeChild(svgElement.firstChild);
        
        for (let conn of connections) {
            const leftCard = getCardElementByUniqueId('left', conn.leftId);
            const rightCard = getCardElementByUniqueId('right', conn.rightId);
            if (leftCard && rightCard) {
                if (conn.isCorrect) {
                    drawCurveBetween(leftCard, rightCard, '#10b981', 3, false);
                } else {
                    drawCurveBetween(leftCard, rightCard, '#f97316', 2.5, true);
                }
            }
        }
    }
    
    function getCardElementByUniqueId(side, uniqueId) {
        const selector = side === 'left' ? '#leftList .card' : '#rightList .card';
        const cards = document.querySelectorAll(selector);
        for (let card of cards) {
            if (parseInt(card.dataset.uniqueId) === uniqueId) return card;
        }
        return null;
    }
    
    function drawCurveBetween(fromElem, toElem, color, strokeWidth, isDashed) {
        const containerRect = matchAreaDiv.getBoundingClientRect();
        const fromRect = fromElem.getBoundingClientRect();
        const toRect = toElem.getBoundingClientRect();
        const startX = fromRect.right - containerRect.left - 6;
        const startY = (fromRect.top + fromRect.bottom) / 2 - containerRect.top;
        const endX = toRect.left - containerRect.left + 6;
        const endY = (toRect.top + toRect.bottom) / 2 - containerRect.top;
        
        const offset = Math.min(65, Math.abs(endX - startX) * 0.28);
        const cp1x = startX + (endX - startX) * 0.25;
        const cp1y = startY - offset;
        const cp2x = endX - (endX - startX) * 0.25;
        const cp2y = endY - offset;
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}`);
        path.setAttribute("stroke", color);
        path.setAttribute("stroke-width", strokeWidth);
        path.setAttribute("fill", "none");
        if (isDashed) {
            path.setAttribute("stroke-dasharray", "6 6");
        }
        path.setAttribute("stroke-linecap", "round");
        svgElement.appendChild(path);
        
        const startCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        startCircle.setAttribute("cx", startX);
        startCircle.setAttribute("cy", startY);
        startCircle.setAttribute("r", "4");
        startCircle.setAttribute("fill", "#3b82f6");
        svgElement.appendChild(startCircle);
        
        const endCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        endCircle.setAttribute("cx", endX);
        endCircle.setAttribute("cy", endY);
        endCircle.setAttribute("r", "4");
        endCircle.setAttribute("fill", "#10b981");
        svgElement.appendChild(endCircle);
    }
    
    function refreshCardsStyles() {
        document.querySelectorAll('#leftList .card').forEach(card => {
            const uid = parseInt(card.dataset.uniqueId);
            const item = leftItems.find(i => i.id === uid);
            if (item?.matched) {
                card.classList.add('correct-matched');
            } else {
                card.classList.remove('correct-matched');
            }
            if (selectedSide === 'left' && selectedId === uid) card.classList.add('selected');
            else card.classList.remove('selected');
        });
        document.querySelectorAll('#rightList .card').forEach(card => {
            const uid = parseInt(card.dataset.uniqueId);
            const item = rightItems.find(i => i.id === uid);
            if (item?.matched) {
                card.classList.add('correct-matched');
            } else {
                card.classList.remove('correct-matched');
            }
            if (selectedSide === 'right' && selectedId === uid) card.classList.add('selected');
            else card.classList.remove('selected');
        });
    }
    
    function clearSelected() {
        selectedSide = null;
        selectedId = null;
        refreshCardsStyles();
    }
    
    // 核心连线逻辑：无论对错都建立连线，正确则同时锁定卡片并记录为正确连线
    function addConnection(leftId, rightId) {
        const leftItem = leftItems.find(i => i.id === leftId);
        const rightItem = rightItems.find(i => i.id === rightId);
        if (!leftItem || !rightItem) return false;
        
        // 如果任意卡片已经正确匹配过，不允许再更改（因为已经锁定）
        if (leftItem.matched || rightItem.matched) return false;
        
        const isCorrect = (leftItem.pairId === rightItem.pairId);
        
        // 检查是否已经存在这对连线（避免重复添加）
        const existingIndex = connections.findIndex(conn => conn.leftId === leftId && conn.rightId === rightId);
        if (existingIndex !== -1) {
            // 如果已经存在，并且当前配对状态不同，则更新其正确性（但已经锁定的卡片不能改变）
            if (connections[existingIndex].isCorrect !== isCorrect) {
                connections[existingIndex].isCorrect = isCorrect;
            }
        } else {
            // 新连线
            connections.push({ leftId, rightId, isCorrect });
        }
        
        // 如果是正确配对，锁定卡片并清理该卡片参与的其他错误连线（保证每个卡片只能正确配对一次）
        if (isCorrect) {
            leftItem.matched = true;
            rightItem.matched = true;
            // 移除与该对卡片相关的其他错误连线（leftId 或 rightId 涉及的其他连线）
            connections = connections.filter(conn => {
                // 保留当前正确连线，但移除其他包含 leftId 或 rightId 且不是当前正确配对的连线
                if (conn.leftId === leftId && conn.rightId === rightId) return true;
                if (conn.leftId === leftId || conn.rightId === rightId) {
                    return false; // 移除其他涉及这两张卡片的旧连线
                }
                return true;
            });
            // 确保正确连线还在
            if (!connections.some(conn => conn.leftId === leftId && conn.rightId === rightId)) {
                connections.push({ leftId, rightId, isCorrect: true });
            }
        }
        
        refreshCardsStyles();
        drawAllLines();
        return true;
    }
    
    // 统计正确的连线数量（基于 matches 概念，即已锁定的正确配对个数）
    function getCorrectCount() {
        // 正确配对数量 = leftItems 中 matched 为 true 的数量（或者根据 connections 中 isCorrect 且卡片locked）
        // 由于正确配对时卡片locked，直接统计 leftItems 中 matched 的数量即可，因为每正确配对一次，左右各锁一个，数量相同
        const correctLeftCount = leftItems.filter(item => item.matched).length;
        return correctLeftCount;
    }
    
    // 结束匹配，计算得分并显示弹窗（不再允许继续连线）
    function finishAndShowScore() {
        const correctCount = getCorrectCount();
        const total = pairsLibrary.length;
        
        // 禁用进一步连线（冻结游戏）
        freezeGame(true);
        
        let html = '';
        if (correctCount === total) {
            html = `
                <div class="trophy-icon">🏆🏆🏆</div>
                <div class="score-text">完美通关！</div>
                <div class="score-number">${correctCount} / ${total}</div>
                <div style="font-size:1.2rem; color:#2b6cb0;">平行线的性质与判定 已完全掌握 ✨</div>
                <button class="result-btn" id="closeResultBtn">继续挑战</button>
            `;
            startFireworks();
        } else {
            html = `
                <div class="encourage-icon">📚✨</div>
                <div class="score-text">你的得分</div>
                <div class="score-number">${correctCount} / ${total}</div>
                <div style="font-size:1.1rem; color:#b45309; margin-top:10px;">你已经很棒啦，继续加油！</div>
                <button class="result-btn" id="closeResultBtn">再试一次</button>
            `;
            stopFireworks();
        }
        
        resultContent.innerHTML = html;
        resultModal.classList.add('show');
        
        const closeBtn = document.getElementById('closeResultBtn');
        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                resultModal.classList.remove('show');
                stopFireworks();
                freezeGame(false);
                resetGame();  // 关闭弹窗后自动重置，开始新的一轮
            });
        }
    }
    
    let gameFrozen = false;
    
    function freezeGame(freeze) {
        gameFrozen = freeze;
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            if (freeze) {
                card.style.pointerEvents = 'none';
            } else {
                // 解除冻结时，只有未正确匹配的卡片恢复点击
                const uid = parseInt(card.dataset.uniqueId);
                const side = card.dataset.side;
                let isMatched = false;
                if (side === 'left') {
                    const item = leftItems.find(i => i.id === uid);
                    isMatched = item?.matched || false;
                } else {
                    const item = rightItems.find(i => i.id === uid);
                    isMatched = item?.matched || false;
                }
                if (!isMatched) {
                    card.style.pointerEvents = 'auto';
                } else {
                    card.style.pointerEvents = 'none';
                }
            }
        });
    }
    
    // 每次渲染后更新交互性
    function updateCardInteractivity() {
        if (gameFrozen) {
            document.querySelectorAll('.card').forEach(c => c.style.pointerEvents = 'none');
        } else {
            document.querySelectorAll('.card').forEach(card => {
                const uid = parseInt(card.dataset.uniqueId);
                const side = card.dataset.side;
                let isMatched = false;
                if (side === 'left') {
                    const item = leftItems.find(i => i.id === uid);
                    isMatched = item?.matched || false;
                } else {
                    const item = rightItems.find(i => i.id === uid);
                    isMatched = item?.matched || false;
                }
                if (!isMatched) {
                    card.style.pointerEvents = 'auto';
                } else {
                    card.style.pointerEvents = 'none';
                }
            });
        }
    }
    
    // 处理卡片点击
    function handleCardClick(side, uniqueId) {
        if (gameFrozen) return;
        
        let currentItem = side === 'left' ? leftItems.find(i => i.id === uniqueId) : rightItems.find(i => i.id === uniqueId);
        if (currentItem?.matched) return;
        
        if (selectedSide === null) {
            selectedSide = side;
            selectedId = uniqueId;
            refreshCardsStyles();
            return;
        }
        
        if (selectedSide === side) {
            selectedSide = side;
            selectedId = uniqueId;
            refreshCardsStyles();
            return;
        }
        
        // 异侧配对，建立连线
        if (selectedSide === 'left' && side === 'right') {
            addConnection(selectedId, uniqueId);
        } else if (selectedSide === 'right' && side === 'left') {
            addConnection(uniqueId, selectedId);
        }
        clearSelected();
        refreshCardsStyles();
        updateCardInteractivity();
        
        const correctCount = getCorrectCount();
        feedbackDiv.innerHTML = `🔗 已连线 (当前正确配对: ${correctCount}/${pairsLibrary.length})，可继续调整连线。完成所有配对后点击「结束匹配」。`;
    }
    
    function renderAllCards() {
        leftContainer.innerHTML = '';
        rightContainer.innerHTML = '';
        
        leftItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card left-card';
            card.innerText = item.text;
            card.dataset.side = 'left';
            card.dataset.uniqueId = item.id;
            if (item.matched) card.classList.add('correct-matched');
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                handleCardClick('left', item.id);
            });
            leftContainer.appendChild(card);
        });
        
        rightItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card right-card';
            card.innerText = item.text;
            card.dataset.side = 'right';
            card.dataset.uniqueId = item.id;
            if (item.matched) card.classList.add('correct-matched');
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                handleCardClick('right', item.id);
            });
            rightContainer.appendChild(card);
        });
        refreshCardsStyles();
        updateCardInteractivity();
    }
    
    function setupSVGCanvas() {
        const oldSvg = matchAreaDiv.querySelector('svg');
        if (oldSvg) oldSvg.remove();
        svgElement = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svgElement.style.position = "absolute";
        svgElement.style.top = "0";
        svgElement.style.left = "0";
        svgElement.style.width = "100%";
        svgElement.style.height = "100%";
        svgElement.style.pointerEvents = "none";
        svgElement.style.zIndex = "200";
        matchAreaDiv.style.position = "relative";
        matchAreaDiv.appendChild(svgElement);
        
        const redraw = () => drawAllLines();
        window.addEventListener('resize', redraw);
        if (resizeObserver) resizeObserver.disconnect();
        resizeObserver = new ResizeObserver(() => redraw());
        resizeObserver.observe(matchAreaDiv);
        resizeObserver.observe(leftContainer);
        resizeObserver.observe(rightContainer);
    }
    
    function startFireworks() {
        if (isFireworksPlaying) return;
        isFireworksPlaying = true;
        if (!ctx) {
            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
            ctx = fireworksCanvas.getContext('2d');
        }
        ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
        
        let particles = [];
        const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#ff6f61', '#f4d03f'];
        
        function random(min, max) { return Math.random() * (max - min) + min; }
        
        function createFirework(x, y) {
            const count = 60 + Math.floor(Math.random() * 40);
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = random(3, 9);
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push({
                    x, y, vx, vy, life: 1.0,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: random(3, 7), decay: 0.018 + Math.random() * 0.015
                });
            }
        }
        
        function generateRandomFirework() {
            const x = random(100, fireworksCanvas.width - 100);
            const y = random(100, fireworksCanvas.height * 0.7);
            createFirework(x, y);
        }
        
        let frame = 0;
        let interval = setInterval(() => {
            if (!isFireworksPlaying) { clearInterval(interval); return; }
            generateRandomFirework();
            if (frame % 3 === 0) generateRandomFirework();
            frame++;
        }, 280);
        
        function animate() {
            if (!isFireworksPlaying) {
                if (ctx) ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
                return;
            }
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
            ctx.globalCompositeOperation = 'lighter';
            for (let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay;
                if (p.life <= 0 || p.y > fireworksCanvas.height + 50) { particles.splice(i,1); continue; }
                ctx.globalAlpha = p.life * 0.9;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
                ctx.fillStyle = p.color; ctx.fill();
            }
            requestAnimationFrame(animate);
        }
        animate();
        fireworksInterval = interval;
    }
    
    function initGame() {
        initShuffledData();
        renderAllCards();
        setupSVGCanvas();
        drawAllLines();
        gameFrozen = false;
        const resetBtn = document.getElementById('resetBtn');
        resetBtn.addEventListener('click', () => {
            stopFireworks();
            resultModal.classList.remove('show');
            freezeGame(false);
            resetGame();
        });
        const finishBtn = document.getElementById('finishBtn');
        finishBtn.addEventListener('click', () => finishAndShowScore());
    }
    
    initGame();
</script>
